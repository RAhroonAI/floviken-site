<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 225" preserveAspectRatio="xMidYMid meet">
  <!--
    Floviken — minimal water study.
    Horizontal pen marks suggesting a calm bay.
    A single small reed cluster as the only figurative element,
    placed off-center to break the rhythm.
  -->

  <g stroke="#6a6a6a" fill="none" stroke-linecap="round">

    <!-- Water lines: long, sparse, with broken segments to feel hand-drawn.
         Spacing tightens slightly toward the middle for a soft focal band. -->

    <!-- top band: very pale, very long -->
    <g stroke="#b8b8b8" stroke-width="0.6">
      <path d="M 80 78 L 320 78"/>
      <path d="M 360 78 L 540 78"/>
      <path d="M 580 78 L 760 78"/>
    </g>

    <g stroke="#b0b0b0" stroke-width="0.6">
      <path d="M 120 92 L 380 92"/>
      <path d="M 430 92 L 700 92"/>
    </g>

    <!-- middle band: stronger, slightly broken -->
    <g stroke="#8a8a8a" stroke-width="0.7">
      <path d="M 60 108 L 280 108"/>
      <path d="M 320 108 L 520 108"/>
      <path d="M 560 108 L 820 108"/>
    </g>

    <g stroke="#7e7e7e" stroke-width="0.75">
      <path d="M 100 122 L 360 122"/>
      <path d="M 410 122 L 640 122"/>
      <path d="M 690 122 L 840 122"/>
    </g>

    <!-- subtle horizon implied by a slightly stronger line, broken near reeds -->
    <g stroke="#6e6e6e" stroke-width="0.85">
      <path d="M 40 138 L 320 138"/>
      <path d="M 360 138 L 600 138"/>
      <!-- gap where the reeds sit -->
      <path d="M 700 138 L 860 138"/>
    </g>

    <!-- closer water marks: longer, occasional gentle dip -->
    <g stroke="#7e7e7e" stroke-width="0.7">
      <path d="M 80 156 q 60 1 120 0 q 60 -1 120 0"/>
      <path d="M 400 156 q 60 1 120 0"/>
      <!-- gap behind reeds -->
      <path d="M 720 156 q 60 1 120 0"/>
    </g>

    <g stroke="#888" stroke-width="0.65">
      <path d="M 120 172 q 80 1 160 0 q 60 -1 120 0"/>
      <path d="M 460 172 q 80 1 160 0"/>
      <path d="M 740 172 q 50 1 100 0"/>
    </g>

    <g stroke="#9a9a9a" stroke-width="0.6">
      <path d="M 60 188 q 100 1 200 0 q 80 -1 160 0 q 80 1 160 0"/>
      <path d="M 540 188 q 60 -1 120 0"/>
    </g>

  </g>

  <!-- ============================================================
       Single small reed cluster, the only figurative element.
       Off-center right to break the horizontal rhythm.
       ============================================================ -->
  <g transform="translate(648, 165)" stroke="#4a4a4a" fill="none" stroke-linecap="round">
    <!-- thin stalks -->
    <g stroke-width="0.7">
      <path d="M 0 0 L -1 -28"/>
      <path d="M 6 0 L 5 -34"/>
      <path d="M 12 0 L 13 -22"/>
      <path d="M 19 0 L 18 -38"/>
      <path d="M 26 0 L 27 -26"/>
      <path d="M 33 0 L 32 -32"/>
      <path d="M 40 0 L 41 -20"/>
      <path d="M 47 0 L 46 -30"/>
    </g>
    <!-- a couple of cattail seedheads -->
    <g stroke-width="2.2">
      <path d="M 5 -34 L 5 -39"/>
      <path d="M 18 -38 L 18 -43"/>
      <path d="M 32 -32 L 32 -37"/>
      <path d="M 46 -30 L 46 -34"/>
    </g>
  </g>

</svg>
